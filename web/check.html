<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicle — Server Status</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080c;--s1:#0e0e14;--s2:#14141c;--brd:#1e1e2e;
  --gold:#c9a55a;--gold-dim:#8a7a40;--gold-glow:rgba(201,165,90,.15);
  --txt:#d4d0c8;--dim:#6a6658;--red:#b04848;--grn:#5a9a6a;--blu:#6080a8;
}
html{background:var(--bg);color:var(--txt);font-family:'Cormorant Garamond',serif}
body{min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}

/* --- grain overlay --- */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
}

/* --- ambient bg glow --- */
.bg-glow{
  position:fixed;top:-30%;left:-10%;width:60%;height:60%;
  background:radial-gradient(ellipse,rgba(201,165,90,.04) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
.bg-glow2{
  position:fixed;bottom:-20%;right:-15%;width:50%;height:50%;
  background:radial-gradient(ellipse,rgba(100,80,160,.03) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* --- layout --- */
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:40px 24px;flex:1;width:100%}
header{text-align:center;margin-bottom:48px}
h1{
  font-family:'Cinzel Decorative',serif;font-size:clamp(28px,6vw,52px);
  font-weight:700;letter-spacing:6px;color:var(--gold);
  text-shadow:0 0 40px rgba(201,165,90,.25);
  animation:fadeDown .8s ease-out both;
}
.subtitle{
  font-size:clamp(13px,2.5vw,16px);color:var(--dim);letter-spacing:3px;
  text-transform:uppercase;margin-top:8px;
  animation:fadeDown .8s ease-out .15s both;
}

@keyframes fadeDown{
  from{opacity:0;transform:translateY(-16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* --- cards --- */
.card{
  background:var(--s1);border:1px solid var(--brd);border-radius:6px;
  padding:24px;margin-bottom:20px;
  animation:fadeIn .6s ease-out both;
}
.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.2s}
.card:nth-child(4){animation-delay:.3s}

.card-title{
  font-family:'Cinzel Decorative',serif;font-size:14px;
  letter-spacing:2px;text-transform:uppercase;color:var(--gold);
  margin-bottom:16px;display:flex;align-items:center;gap:10px;
}
.card-title::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--brd),transparent);
}

/* --- status grid --- */
.status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.status-item{
  background:var(--bg);border:1px solid var(--brd);border-radius:4px;
  padding:14px;display:flex;flex-direction:column;gap:6px;
  transition:border-color .3s;
}
.status-item:hover{border-color:var(--gold-dim)}
.status-label{
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--dim);font-family:'JetBrains Mono',monospace;
}
.status-value{
  font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;
  display:flex;align-items:center;gap:8px;
}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.ok{background:var(--grn);box-shadow:0 0 8px rgba(90,154,106,.5)}
.dot.err{background:var(--red);box-shadow:0 0 8px rgba(176,72,72,.5)}
.dot.wait{background:var(--gold);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* --- log area --- */
.log{
  background:var(--bg);border:1px solid var(--brd);border-radius:4px;
  padding:14px;font-family:'JetBrains Mono',monospace;font-size:12px;
  line-height:1.8;max-height:260px;overflow-y:auto;color:var(--dim);
}
.log .ts{color:var(--dim);margin-right:8px}
.log .ok{color:var(--grn)}.log .er{color:var(--red)}.log .wr{color:var(--gold)}

/* --- info table --- */
.info-table{width:100%;border-collapse:collapse}
.info-table td{
  padding:8px 12px;border-bottom:1px solid var(--brd);font-size:14px;
  vertical-align:top;
}
.info-table td:first-child{
  color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:11px;
  letter-spacing:1px;text-transform:uppercase;width:140px;white-space:nowrap;
}
.info-table tr:last-child td{border-bottom:none}

/* --- action btn --- */
.btn{
  background:transparent;border:1px solid var(--gold-dim);color:var(--gold);
  padding:10px 28px;border-radius:4px;cursor:pointer;
  font-family:'Cinzel Decorative',serif;font-size:13px;letter-spacing:2px;
  transition:all .25s;text-transform:uppercase;
}
.btn:hover{background:var(--gold);color:var(--bg);box-shadow:0 0 20px rgba(201,165,90,.25)}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px}

/* --- footer --- */
footer{
  text-align:center;padding:24px;color:var(--dim);
  font-size:12px;letter-spacing:1px;border-top:1px solid var(--brd);
}

/* --- scrollbar --- */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}

/* --- responsive --- */
@media(max-width:600px){
  .wrap{padding:24px 16px}
  header{margin-bottom:32px}
  .card{padding:16px}
  .status-grid{grid-template-columns:1fr 1fr}
  .info-table td:first-child{width:auto}
}
@media(max-width:380px){
  .status-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="wrap">
  <header>
    <h1>CHRONICLE</h1>
    <div class="subtitle">Server Diagnostics</div>
  </header>

  <!-- STATUS CHECKS -->
  <div class="card">
    <div class="card-title">System Status</div>
    <div class="status-grid">
      <div class="status-item">
        <span class="status-label">Node.js API</span>
        <span class="status-value" id="s-api"><span class="dot wait"></span>Checking…</span>
      </div>
      <div class="status-item">
        <span class="status-label">WebSocket</span>
        <span class="status-value" id="s-ws"><span class="dot wait"></span>Checking…</span>
      </div>
      <div class="status-item">
        <span class="status-label">Database</span>
        <span class="status-value" id="s-db"><span class="dot wait"></span>Checking…</span>
      </div>
      <div class="status-item">
        <span class="status-label">Static Files</span>
        <span class="status-value" id="s-static"><span class="dot ok"></span>Serving</span>
      </div>
    </div>
  </div>

  <!-- SERVER INFO -->
  <div class="card">
    <div class="card-title">Environment</div>
    <table class="info-table">
      <tr><td>Host</td><td id="i-host">—</td></tr>
      <tr><td>Protocol</td><td id="i-proto">—</td></tr>
      <tr><td>User Agent</td><td id="i-ua" style="word-break:break-word">—</td></tr>
      <tr><td>Viewport</td><td id="i-vp">—</td></tr>
      <tr><td>Timestamp</td><td id="i-ts">—</td></tr>
    </table>
  </div>

  <!-- LOG -->
  <div class="card">
    <div class="card-title">Diagnostic Log</div>
    <div class="log" id="log"></div>
  </div>

  <!-- ACTIONS -->
  <div class="card">
    <div class="card-title">Actions</div>
    <div class="actions">
      <button class="btn" onclick="runAll()">Re-run All Checks</button>
      <button class="btn" onclick="clearLog()">Clear Log</button>
    </div>
  </div>
</div>

<footer>Chronicle &mdash; campaign management system &mdash; <span id="year"></span></footer>

<script>
const API_BASE = '/api';
const logEl = document.getElementById('log');

function ts() {
  return new Date().toLocaleTimeString('en-GB');
}

function log(msg, type = 'ok') {
  const line = document.createElement('div');
  line.innerHTML = `<span class="ts">${ts()}</span><span class="${type}">${msg}</span>`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(id, ok, text) {
  const el = document.getElementById(id);
  el.innerHTML = `<span class="dot ${ok ? 'ok' : 'err'}"></span>${text}`;
}

function setWait(id) {
  const el = document.getElementById(id);
  el.innerHTML = `<span class="dot wait"></span>Checking…`;
}

// --- fill environment info ---
function fillInfo() {
  document.getElementById('i-host').textContent = location.hostname;
  document.getElementById('i-proto').textContent = location.protocol.replace(':', '').toUpperCase();
  document.getElementById('i-ua').textContent = navigator.userAgent;
  document.getElementById('i-vp').textContent = `${window.innerWidth} × ${window.innerHeight}`;
  document.getElementById('i-ts').textContent = new Date().toISOString();
  document.getElementById('year').textContent = new Date().getFullYear();
}

// --- API check ---
async function checkAPI() {
  setWait('s-api');
  log('Testing Node.js API endpoint…', 'wr');
  try {
    const start = performance.now();
    const res = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(5000) });
    const ms = Math.round(performance.now() - start);
    if (res.ok) {
      const data = await res.json().catch(() => ({}));
      setStatus('s-api', true, `OK — ${ms}ms`);
      log(`API responded ${res.status} in ${ms}ms`, 'ok');
      if (data.version) log(`  API version: ${data.version}`, 'ok');
      return data;
    } else {
      setStatus('s-api', false, `HTTP ${res.status}`);
      log(`API returned HTTP ${res.status}`, 'er');
    }
  } catch (e) {
    setStatus('s-api', false, 'Unreachable');
    log(`API unreachable: ${e.message}`, 'er');
  }
  return null;
}

// --- DB check (via API health) ---
async function checkDB(healthData) {
  setWait('s-db');
  log('Checking database connectivity…', 'wr');
  if (healthData && healthData.db === 'ok') {
    setStatus('s-db', true, 'Connected');
    log('Database connection confirmed via API health', 'ok');
  } else if (healthData) {
    setStatus('s-db', false, healthData.db || 'Unknown');
    log(`Database status: ${healthData.db || 'not reported'}`, 'er');
  } else {
    setStatus('s-db', false, 'No data');
    log('Cannot check DB — API unreachable', 'er');
  }
}

// --- WebSocket check ---
function checkWS() {
  setWait('s-ws');
  log('Testing WebSocket connection…', 'wr');
  return new Promise(resolve => {
    try {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/socket.io/?EIO=4&transport=websocket`);
      const timeout = setTimeout(() => {
        ws.close();
        setStatus('s-ws', false, 'Timeout');
        log('WebSocket connection timed out (5s)', 'er');
        resolve();
      }, 5000);

      ws.onopen = () => {
        clearTimeout(timeout);
        setStatus('s-ws', true, 'Connected');
        log('WebSocket handshake successful', 'ok');
        ws.close();
        resolve();
      };
      ws.onerror = () => {
        clearTimeout(timeout);
        setStatus('s-ws', false, 'Failed');
        log('WebSocket connection failed', 'er');
        resolve();
      };
    } catch (e) {
      setStatus('s-ws', false, 'Error');
      log(`WebSocket error: ${e.message}`, 'er');
      resolve();
    }
  });
}

function clearLog() {
  logEl.innerHTML = '';
  log('Log cleared', 'wr');
}

async function runAll() {
  log('─── Starting diagnostics ───', 'wr');
  fillInfo();
  const health = await checkAPI();
  await checkDB(health);
  await checkWS();
  log('─── Diagnostics complete ───', 'wr');
}

// initial run
runAll();

// keep viewport updated on resize
window.addEventListener('resize', () => {
  document.getElementById('i-vp').textContent = `${window.innerWidth} × ${window.innerHeight}`;
});
</script>
</body>
</html>
